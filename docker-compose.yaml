version: '3.8'

services:
  nestjs-app:
    image: nest-api
    container_name: nestjs-app
    build:
      dockerfile: Dockerfile
      context: .
      target: development
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=liftcrew
      - DATABASE_NAME=liftcrew
      - MODE=DEV
      - RUN_MIGRATIONS=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=liftcrew123
      - JWT_SECRET=ins7tJvLL1vAkYgqUP0IyBFgqG/PTUspUba7pU0p5Jt9Qsf9sKgB7gXkioYnzhm9XPak6Ekc9PBaLthVtBTIFw==
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

  db:
    image: postgres:latest
    container_name: postgres-db
    environment:
      - POSTGRES_DB=liftcrew
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=liftcrew
    ports:
      - '5432:5432'

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - '6379:6379'

  neo4j:
    image: neo4j:5.25-community
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/liftcrew123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - '7474:7474'  # HTTP
      - '7687:7687'  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  neo4j_data:
  neo4j_logs:
